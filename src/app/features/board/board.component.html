<div class="board-page">
    <div class="board-header">
        <h2>{{ board?.title }}</h2>
    </div>

    <div class="board-columns">
        @for (column of columns; track column.id) {
            <div class="board-col">
                <h3>{{ column.title }}</h3>

                @for (task of tasks[column.id]; track task.id) {
                    <div class="task-card">
                        <h4>{{ task.title }}</h4>
                        <p>{{ task.description }}</p>
                    </div>
                }
            </div>
        }
    </div>
</div>
