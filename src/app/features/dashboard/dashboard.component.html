<header class="topbar">
    <h1>Dashboard</h1>
</header>

<section class="boards">
    @for (board of boards; track board.id) {
        <div class="board-card">
            <h3>{{ board.title }}</h3>

            <p>{{ board.description }}</p>
        </div>
    }

    <div class="board-card add-card">+ Create Board</div>
</section>
