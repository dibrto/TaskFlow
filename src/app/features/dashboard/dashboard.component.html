<header class="topbar">
    <h1>Dashboard</h1>
</header>

<section class="boards">
    @for (board of boards$ | async; track board.id) {
        <div class="board-card" (click)="onBoardClick(board)">
            <h3>{{ board.title }}</h3>

            <p>{{ board.description }}</p>
        </div>
    }

    <div class="board-card add-card" (click)="onOpenModal()">Create new board</div>
</section>

@if (isModalCreateBoard) {
    <app-create-dashboard (close)="onCloseModal()" />
}
