<header class="topbar">
    <h1>Dashboard</h1>
    <button class="create-btn">+ New Board</button>
</header>

<section class="boards">
    @for (board of boards; track $index) {
        <div class="board-card">
            <h3>{{ board.title }}</h3>

            <p>{{ board.tasks }} tasks</p>
        </div>
    }

    <div class="board-card add-card">+ Create Board</div>
</section>
