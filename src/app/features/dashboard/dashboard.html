<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">TaskFlow</h2>

        <nav>
            <a class="nav-item active">Dashboard</a>
            <a class="nav-item">My Boards</a>
            <a class="nav-item">Profile</a>
        </nav>

        <button class="logout">Logout</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <header class="topbar">
            <h1>Dashboard</h1>

            <button class="create-btn">+ New Board</button>
        </header>

        <!-- BOARDS -->
        <section class="boards">
            @for (board of boards; track $index) {
                <div class="board-card">
                    <h3>{{ board.title }}</h3>

                    <p>{{ board.tasks }} tasks</p>
                </div>
            }

            <!-- ADD CARD -->
            <div class="board-card add-card">+ Create Board</div>
        </section>
    </main>
</div>
