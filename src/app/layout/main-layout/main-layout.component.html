<div class="layout">
    <aside class="sidebar">
        <h2 class="logo">TaskFlow</h2>

        <nav>
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
            <a class="nav-item">My Boards</a>
            @for (board of boards$ | async; track board.id) {
                <a [routerLink]="['/board', board.id]" routerLinkActive="active" class="nav-item">{{ board.title }}</a>
            }
        </nav>

        <button type="button" class="logout" (click)="onLogout()">Logout</button>
    </aside>

    <main class="main">
        <router-outlet />
    </main>
</div>
